# ============================================================
# OrangeHRM Locator Repository
# Format: logicalName = strategy~value
# Strategies: id, name, xpath, css, linkText, partialLinkText, tagName, className
# Locators are added per-feature as page classes are built.
# ==========================================================

# ---------- Login ----------
login.username = name~username
login.password = name~password
login.loginBtn = xpath~//button[normalize-space()='Login']
login.invalidCredentials = xpath~//*[text()='Invalid credentials']
login.requiredError = xpath~//span[text()='Required']

# ---------- Main Menu ----------
menu.admin = xpath~//span[text()='Admin']
menu.pim = xpath~//span[text()='PIM']
menu.leave = xpath~//span[text()='Leave']

# ---------- User Dropdown (top-right) ----------
menu.userDropdown = css~.oxd-userdropdown-name
menu.logout = xpath~//*[text()='Logout']

# ---------- Add Employee (PIM) ----------
emp.add = xpath~//button[normalize-space()='Add']
addEmp.firstName = name~firstName
addEmp.middleName = name~middleName
addEmp.lastName = name~lastName
addEmp.save = xpath~//button[@type='submit']