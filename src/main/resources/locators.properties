# ============================================================
# OrangeHRM Locator Repository
# Format: logicalName = strategy~value
# Strategies: id, name, xpath, css, linkText, partialLinkText, tagName, className
# Locators are added per-feature as page classes are built.
# ============================================================

# ---------- Login ----------
login.username = name~username
login.password = name~password
login.loginBtn = xpath~//button[normalize-space()='Login']
login.invalidCredentials = xpath~//*[normalize-space()='Invalid credentials']
login.requiredError = xpath~//span[normalize-space()='Required']

# ---------- Sidebar (global navigation component) ----------
sidebar.admin = xpath~//a[contains(@class,'oxd-main-menu-item')][.//span[normalize-space()='Admin']]
sidebar.pim = xpath~//span[normalize-space()='PIM']
sidebar.leave = xpath~//span[normalize-space()='Leave']

# ---------- User Dropdown (top-right) ----------
menu.userDropdown = css~.oxd-userdropdown-name
menu.logout = xpath~//*[normalize-space()='Logout']

# ---------- Admin top-bar menu (Admin-scoped navigation component) ----------
adminMenu.job = xpath~//span[normalize-space()='Job']
adminMenu.jobTitles = linkText~Job Titles

# ---------- Job Titles page ----------
jobTitles.add = xpath~//button[normalize-space()='Add']
jobTitles.titleInput = xpath~//label[normalize-space()='Job Title']/../following-sibling::div//input
jobTitles.save = xpath~//button[normalize-space()='Save']
jobTitles.successToast = xpath~//*[normalize-space()='Successfully Saved']
jobTitles.rowByTitle = xpath~//div[@role='row'][.//div[normalize-space()='%s']]
jobTitles.editIconByTitle = xpath~//div[@role='row'][.//div[normalize-space()='%s']]//button[.//i[contains(@class,'bi-pencil-fill')]]
jobTitles.deleteIconByTitle = xpath~//div[@role='row'][.//div[normalize-space()='%s']]//button[.//i[contains(@class,'bi-trash')]]
jobTitles.deleteConfirm = xpath~//button[normalize-space()='Yes, Delete']